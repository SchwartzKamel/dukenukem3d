name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      LLM_PLAYTEST_API_KEY_SET: ${{ secrets.LLM_PLAYTEST_API_KEY != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsdl2-dev python3-pip
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Build Linux binary
        run: make
      
      - name: Verify binary exists
        run: |
          test -f duke3d
          file duke3d | grep -q "ELF 64-bit"
          echo "✅ Linux binary built successfully"
      
      - name: Run tests with coverage
        run: python3 -m pytest tests/ -v --tb=short --runslow --cov=tools --cov-report=term-missing --cov-fail-under=50
      
      - name: Generate assets
        run: python3 tools/generate_assets.py --no-ai

      - name: Run LLM playtest (stub)
        run: python3 -m pytest tests/test_llm_playtest.py -v -m playtest --tb=short

      - name: Run LLM playtest (live, optional)
        if: ${{ env.LLM_PLAYTEST_API_KEY_SET == 'true' }}
        env:
          LLM_PLAYTEST_ENDPOINT: ${{ secrets.LLM_PLAYTEST_ENDPOINT }}
          LLM_PLAYTEST_MODEL: ${{ secrets.LLM_PLAYTEST_MODEL }}
          LLM_PLAYTEST_API_KEY: ${{ secrets.LLM_PLAYTEST_API_KEY }}
        run: python3 -m pytest tests/test_llm_playtest.py::test_llm_playtest_live_passes_when_configured -v -m playtest --tb=short

      - name: Validate generated artifacts
        run: python3 tools/validate_generated_artifacts.py --sets textures grp maps scripts --no-audio-manifest

      - name: Verify GRP file
        run: |
          test -f DUKE3D.GRP
          test $(stat -c%s DUKE3D.GRP) -gt 100000
          echo "✅ DUKE3D.GRP generated ($(stat -c%s DUKE3D.GRP) bytes)"
      
      - name: Upload Linux binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: duke3d-linux-x64
          path: |
            duke3d
            DUKE3D.GRP
          retention-days: 30

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 python3-pip
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Parse SDL2 version
        run: |
          SDL2_VERSION=$(grep '^SDL2_VERSION' build.mk | head -1 | sed 's/.*= *//')
          echo "SDL2_VERSION=${SDL2_VERSION}" >> $GITHUB_ENV
      
      - name: Cache SDL2 MinGW
        id: cache-sdl2
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4
        with:
          path: SDL2-${{ env.SDL2_VERSION }}
          key: sdl2-mingw-${{ env.SDL2_VERSION }}
          restore-keys: |
            sdl2-mingw-${{ env.SDL2_VERSION | split('.')[0] }}.${{ env.SDL2_VERSION | split('.')[1] }}.
      
      - name: Install SDL2 for MinGW
        if: steps.cache-sdl2.outputs.cache-hit != 'true'
        run: bash tools/get_sdl2_mingw.sh
      
      - name: Setup SDL2 environment variables
        run: |
          SDL2_VERSION=$(grep '^SDL2_VERSION' build.mk | head -1 | sed 's/.*= *//')
          echo "SDL2_WIN_CFLAGS=-I$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/include/SDL2" >> $GITHUB_ENV
          echo "SDL2_WIN_LIBS=-L$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/lib -lmingw32 -lSDL2main -lSDL2" >> $GITHUB_ENV
      
      - name: Build Windows binary
        run: make windows
      
      - name: Verify Windows binary exists
        run: |
          test -f duke3d.exe
          file duke3d.exe | grep -q "PE32"
          echo "✅ Windows binary built successfully"
      
      - name: Run struct size tests (MinGW cross-compile)
        run: |
          STRUCT_TEST_CC=i686-w64-mingw32-gcc python3 -m pytest tests/test_build_structs.py tests/test_compat_layer.py -v --tb=short
      
      - name: Generate assets
        run: python3 tools/generate_assets.py --no-ai
      
      - name: Validate generated artifacts (Windows)
        run: python3 tools/validate_generated_artifacts.py --sets textures grp maps scripts --no-audio-manifest

      - name: Package Windows release
        run: |
          python3 tools/generate_assets.py --no-ai
          mkdir -p release-win
          cp duke3d.exe DUKE3D.GRP README.md duke3d_launcher.bat release-win/
          bash tools/bundle_windows.sh release-win
      
      - name: Audit DLL dependencies
        run: |
          echo "=== Required DLLs ==="
          i686-w64-mingw32-objdump -p duke3d.exe | grep "DLL Name" | sort
          echo "=== Bundled DLLs ==="
          ls release-win/*.dll
          echo "=== Checking all required DLLs are bundled ==="
          SYSTEM_DLLS="KERNEL32.dll USER32.dll GDI32.dll SHELL32.dll WS2_32.dll ADVAPI32.dll msvcrt.dll IMM32.dll ole32.dll OLEAUT32.dll VERSION.dll SETUPAPI.dll WINMM.dll"
          MISSING=0
          for dll in $(i686-w64-mingw32-objdump -p duke3d.exe | grep "DLL Name" | awk '{print $3}'); do
            is_system=0
            for sys in $SYSTEM_DLLS; do
              if [ "$(echo $dll | tr A-Z a-z)" = "$(echo $sys | tr A-Z a-z)" ]; then
                is_system=1
                break
              fi
            done
            if [ $is_system -eq 0 ]; then
              if ls release-win/$(echo $dll | tr A-Z a-z) release-win/$dll 2>/dev/null | head -1 > /dev/null 2>&1; then
                echo "  OK: $dll (bundled)"
              else
                echo "  MISSING: $dll"
                MISSING=1
              fi
            else
              echo "  OK: $dll (system)"
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "ERROR: Missing required DLLs!"
            exit 1
          fi
          echo "All DLLs accounted for"
      
      - name: Upload Windows package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: duke3d-windows-x86
          path: release-win/
          retention-days: 30

  test-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install Python dependencies
        run: |
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Run asset pipeline tests
        run: python3 -m pytest tests/ -v --tb=short --runslow -k "asset or palette or art or grp or map or table"
      
      - name: Generate assets (procedural)
        run: python3 tools/generate_assets.py --no-ai
      
      - name: Validate generated artifacts
        run: python3 tools/validate_generated_artifacts.py --sets textures grp maps scripts --no-audio-manifest


  test-windows-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Parse SDL2 version
        id: sdlver
        shell: bash
        run: |
          version=$(grep -E '^SDL2_VERSION' build.mk | head -1 | cut -d= -f2 | tr -d ' ')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Cache SDL2 VC devel
        id: cache-sdl2-vc
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4
        with:
          path: SDL2-${{ steps.sdlver.outputs.version }}
          key: sdl2-vc-${{ runner.os }}-${{ steps.sdlver.outputs.version }}
          restore-keys: |
            sdl2-vc-${{ runner.os }}-

      - name: Install SDL2
        run: |
          $SDL2_VERSION = (Select-String -Path build.mk -Pattern '^SDL2_VERSION' | ForEach-Object { $_.Line -replace '.*=\s*', '' })
          Write-Host "SDL2 version: $SDL2_VERSION"
          $cachePath = "SDL2-$SDL2_VERSION"
          if (-Not (Test-Path "$cachePath/cmake")) {
            Write-Host "Cache miss or first run - downloading SDL2 VC..."
            Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-$SDL2_VERSION/SDL2-devel-$SDL2_VERSION-VC.zip" -OutFile SDL2-VC.zip
            Expand-Archive SDL2-VC.zip -DestinationPath .
            Remove-Item SDL2-VC.zip
            Write-Host "SDL2 VC extracted to $cachePath"
          } else {
            Write-Host "Using cached SDL2 VC from $cachePath"
          }
          echo "SDL2_DIR=$PWD\$cachePath" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Configure with CMake (x64)
        run: |
          cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DSDL2_DIR="$env:SDL2_DIR/cmake" -DCMAKE_PREFIX_PATH="$env:SDL2_DIR"
        shell: pwsh

      - name: Build with MSVC (x64)
        run: cmake --build build --config Release

      - name: Generate test assets
        run: python3 tools/generate_assets.py --no-ai

      - name: Run E2E test suite (native MSVC x64)
        run: |
          $exe = "build\duke3d.exe"
          $sdlDll = "$env:SDL2_DIR\lib\x64\SDL2.dll"
          if (Test-Path $sdlDll) {
            Copy-Item $sdlDll -Destination "."
            Write-Host "Copied SDL2.dll to project root for pytest execution"
          }
          python -m pytest tests/ -v --tb=short -m playtest
      
      - name: Run struct size tests (native MSVC)
        run: |
          python -m pytest tests/test_build_structs.py tests/test_compat_layer.py -v --tb=short

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install SDL2 (Homebrew)
        run: |
          brew update
          brew install sdl2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $(sysctl -n hw.ncpu)

      - name: Verify binary exists
        run: |
          test -f build/duke3d || test -f duke3d
          echo "✅ macOS binary built successfully"

  playtest:
    runs-on: ubuntu-latest
    needs: [build-linux]
    continue-on-error: true  # Experimental - don't block PRs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsdl2-dev python3-pip xvfb
          pip3 install --break-system-packages -r requirements.txt

      - name: Check SDL2 availability
        id: sdl2_check
        run: |
          if pkg-config --exists sdl2; then
            echo "sdl2_present=true" >> $GITHUB_OUTPUT
            echo "✅ SDL2 detected via pkg-config"
          else
            echo "sdl2_present=false" >> $GITHUB_OUTPUT
            echo "⚠️ SDL2 not detected — playtest steps will be skipped"
          fi

      - name: Build game
        if: success() && steps.sdl2_check.outputs.sdl2_present == 'true'
        run: make

      - name: Generate assets
        if: success() && steps.sdl2_check.outputs.sdl2_present == 'true'
        run: python3 tools/generate_assets.py --no-ai

      - name: Run visual playtests
        if: success() && steps.sdl2_check.outputs.sdl2_present == 'true'
        run: |
          export SDL_VIDEODRIVER=dummy
          export DUKE3D_HEADLESS=1
          export DUKE3D_SKIP_LOGO=1
          export DUKE3D_FRAME_LIMIT=30
          export DUKE3D_CAPTURE_INTERVAL=5
          # Run headless game directly first as a smoke test
          timeout 15 ./duke3d || true
          # Run the pytest playtest suite
          python3 -m pytest tests/test_visual_playtest.py -v -m playtest --tb=short || true
      
      - name: Upload captured frames
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playtest-frames
          path: captures/
          if-no-files-found: warn
          retention-days: 7
      
      - name: Playtest summary
        if: always()
        run: |
          echo "## Playtest Results" >> $GITHUB_STEP_SUMMARY
          if [ -d captures ]; then
            FRAME_COUNT=$(ls captures/*.bmp 2>/dev/null | wc -l)
            echo "- Captured **${FRAME_COUNT}** frames" >> $GITHUB_STEP_SUMMARY
            if [ "$FRAME_COUNT" -gt 0 ]; then
              python3 -c "
          import sys
          sys.path.insert(0, '.')
          from tools.frame_analyzer import analyze_frame_sequence
          import glob
          frames = sorted(glob.glob('captures/*.bmp'))
          if frames:
              result = analyze_frame_sequence(frames)
              print(f'- All black: **{result[\"all_black\"]}**')
              print(f'- Any content: **{result[\"any_content\"]}**')
              print(f'- Frames with content: **{result[\"frames_with_content\"]}**/{result[\"frame_count\"]}')
              print(f'- Has progression: **{result[\"has_progression\"]}**')
          " >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- No frames captured (game may not have started)" >> $GITHUB_STEP_SUMMARY
          fi
