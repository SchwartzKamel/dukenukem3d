name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsdl2-dev python3 python3-pip
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Build Linux binary
        run: make
      
      - name: Verify binary exists
        run: |
          test -f duke3d
          file duke3d | grep -q "ELF 64-bit"
          echo "✅ Linux binary built successfully"
      
      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
      
      - name: Generate assets
        run: python3 tools/generate_assets.py --no-ai
      
      - name: Verify GRP file
        run: |
          test -f DUKE3D.GRP
          test $(stat -c%s DUKE3D.GRP) -gt 100000
          echo "✅ DUKE3D.GRP generated ($(stat -c%s DUKE3D.GRP) bytes)"
      
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-linux-x64
          path: |
            duke3d
            DUKE3D.GRP
          retention-days: 30

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 python3 python3-pip
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Install SDL2 for MinGW
        run: |
          bash tools/get_sdl2_mingw.sh
          SDL2_VERSION=$(grep '^SDL2_VERSION' build.mk | head -1 | sed 's/.*= *//')
          echo "SDL2_WIN_CFLAGS=-I$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/include/SDL2" >> $GITHUB_ENV
          echo "SDL2_WIN_LIBS=-L$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/lib -lmingw32 -lSDL2main -lSDL2" >> $GITHUB_ENV
      
      - name: Build Windows binary
        run: make windows
      
      - name: Verify Windows binary exists
        run: |
          test -f duke3d.exe
          file duke3d.exe | grep -q "PE32"
          echo "✅ Windows binary built successfully"
      
      - name: Generate assets
        run: python3 tools/generate_assets.py --no-ai
      
      - name: Package Windows release
        run: |
          python3 tools/generate_assets.py --no-ai
          mkdir -p release-win
          cp duke3d.exe DUKE3D.GRP README.md duke3d_launcher.bat release-win/
          bash tools/bundle_windows.sh release-win
      
      - name: Audit DLL dependencies
        run: |
          echo "=== Required DLLs ==="
          i686-w64-mingw32-objdump -p duke3d.exe | grep "DLL Name" | sort
          echo "=== Bundled DLLs ==="
          ls release-win/*.dll
          echo "=== Checking all required DLLs are bundled ==="
          SYSTEM_DLLS="KERNEL32.dll USER32.dll GDI32.dll SHELL32.dll WS2_32.dll ADVAPI32.dll msvcrt.dll IMM32.dll ole32.dll OLEAUT32.dll VERSION.dll SETUPAPI.dll WINMM.dll"
          MISSING=0
          for dll in $(i686-w64-mingw32-objdump -p duke3d.exe | grep "DLL Name" | awk '{print $3}'); do
            is_system=0
            for sys in $SYSTEM_DLLS; do
              if [ "$(echo $dll | tr A-Z a-z)" = "$(echo $sys | tr A-Z a-z)" ]; then
                is_system=1
                break
              fi
            done
            if [ $is_system -eq 0 ]; then
              if ls release-win/$(echo $dll | tr A-Z a-z) release-win/$dll 2>/dev/null | head -1 > /dev/null 2>&1; then
                echo "  OK: $dll (bundled)"
              else
                echo "  MISSING: $dll"
                MISSING=1
              fi
            else
              echo "  OK: $dll (system)"
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "ERROR: Missing required DLLs!"
            exit 1
          fi
          echo "All DLLs accounted for"
      
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-windows-x86
          path: release-win/
          retention-days: 30

  test-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python dependencies
        run: |
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Run asset pipeline tests
        run: python3 -m pytest tests/ -v --tb=short -k "asset or palette or art or grp or map or table"
      
      - name: Generate assets (procedural)
        run: python3 tools/generate_assets.py --no-ai
      
      - name: Validate generated files
        run: |
          echo "Checking generated assets..."
          for f in TILES000.ART PALETTE.DAT TABLES.DAT E1L1.MAP GAME.CON DEFS.CON USER.CON LOOKUP.DAT; do
            test -f generated_assets/$f && echo "  ✅ $f ($(stat -c%s generated_assets/$f) bytes)" || echo "  ❌ $f MISSING"
          done
          test -f DUKE3D.GRP && echo "  ✅ DUKE3D.GRP ($(stat -c%s DUKE3D.GRP) bytes)"

  test-windows-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          $SDL2_VERSION = (Select-String -Path build.mk -Pattern '^SDL2_VERSION' | ForEach-Object { $_.Line -replace '.*=\s*', '' })
          Write-Host "SDL2 version: $SDL2_VERSION"
          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-$SDL2_VERSION/SDL2-devel-$SDL2_VERSION-VC.zip" -OutFile SDL2-VC.zip
          Expand-Archive SDL2-VC.zip -DestinationPath .
          echo "SDL2_DIR=$PWD\SDL2-$SDL2_VERSION" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Configure with CMake (32-bit)
        run: |
          cmake -B build -A Win32 -DCMAKE_BUILD_TYPE=Release -DSDL2_DIR="$env:SDL2_DIR/cmake" -DCMAKE_PREFIX_PATH="$env:SDL2_DIR"
        shell: pwsh

      - name: Build with MSVC
        run: cmake --build build --config Release

      - name: Smoke test
        run: |
          $exe = "build\Release\duke3d.exe"
          if (Test-Path $exe) {
            Write-Host "Binary exists: $exe"
            Write-Host "File info:"
            Get-Item $exe | Format-List Name, Length, LastWriteTime
            # Copy SDL2.dll next to the exe so it can load (32-bit)
            $sdlDll = "$env:SDL2_DIR\lib\x86\SDL2.dll"
            if (Test-Path $sdlDll) {
              Copy-Item $sdlDll -Destination "build\Release\"
              Write-Host "Copied SDL2.dll to build\Release\"
            }
            # Run with timeout - expect it to exit with error (no GRP file)
            # but it should NOT crash with missing DLL errors
            $proc = Start-Process -FilePath $exe -PassThru -NoNewWindow
            Start-Sleep -Seconds 3
            if (!$proc.HasExited) {
              Write-Host "Process still running after 3s - killing (this is OK)"
              Stop-Process -Id $proc.Id -Force
              Write-Host "PASS: Binary runs on Windows"
            } else {
              $code = $proc.ExitCode
              Write-Host "Process exited with code: $code"
              if ($code -eq -1073741515) {
                Write-Host "FAIL: Missing DLL (STATUS_DLL_NOT_FOUND)"
                exit 1
              }
              Write-Host "PASS: Binary executed (exited with $code, likely missing GRP)"
            }
          } else {
            Write-Host "FAIL: Binary not found"
            exit 1
          }
        shell: pwsh
