name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: linux
          - name: windows-x86
            os: ubuntu-latest
            target: windows

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsdl2-dev gcc-mingw-w64-i686 python3-pip
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Parse SDL2 version
        if: matrix.target == 'windows'
        run: |
          SDL2_VERSION=$(grep '^SDL2_VERSION' build.mk | head -1 | sed 's/.*= *//')
          echo "SDL2_VERSION=${SDL2_VERSION}" >> $GITHUB_ENV
      
      - name: Cache SDL2 MinGW
        if: matrix.target == 'windows'
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4
        with:
          path: SDL2-${{ env.SDL2_VERSION }}
          key: sdl2-mingw-${{ env.SDL2_VERSION }}
          restore-keys: |
            sdl2-mingw-${{ env.SDL2_VERSION | split('.')[0] }}.${{ env.SDL2_VERSION | split('.')[1] }}.
      
      - name: Install SDL2 MinGW (Windows only)
        if: matrix.target == 'windows'
        run: |
          bash tools/get_sdl2_mingw.sh
          SDL2_VERSION=$(grep '^SDL2_VERSION' build.mk | head -1 | sed 's/.*= *//')
          echo "SDL2_WIN_CFLAGS=-I$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/include/SDL2" >> $GITHUB_ENV
          echo "SDL2_WIN_LIBS=-L$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/lib -lmingw32 -lSDL2main -lSDL2" >> $GITHUB_ENV
      
      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "windows" ]; then
            make windows
          else
            make
          fi
      
      # sec-r15-workflow-secrets: env-passed, no-echo
      - name: Generate assets
        if: matrix.target == 'linux'
        env:
          FLUX_ENDPOINT: ${{ secrets.FLUX_ENDPOINT }}
          FLUX_API_KEY: ${{ secrets.FLUX_API_KEY }}
          FLUX_MODEL: ${{ secrets.FLUX_MODEL }}
          AUDIO_ENDPOINT: ${{ secrets.AUDIO_ENDPOINT }}
          AUDIO_API_KEY: ${{ secrets.AUDIO_API_KEY }}
          AUDIO_MODEL: ${{ secrets.AUDIO_MODEL }}
        run: bash tools/ci/generate_assets.sh --ai
      
      - name: Validate generated artifacts
        if: matrix.target == 'linux'
        run: python3 tools/validate_generated_artifacts.py --sets textures grp maps scripts

      - name: Package Linux release
        if: matrix.target == 'linux'
        run: |
          mkdir -p duke3d-${{ github.ref_name }}-linux-x64
          cp duke3d DUKE3D.GRP README.md duke3d-${{ github.ref_name }}-linux-x64/
          tar czf duke3d-${{ github.ref_name }}-linux-x64.tar.gz duke3d-${{ github.ref_name }}-linux-x64/
      
      # sec-r15-workflow-secrets: env-passed, no-echo
      - name: Package Windows release
        if: matrix.target == 'windows'
        env:
          FLUX_ENDPOINT: ${{ secrets.FLUX_ENDPOINT }}
          FLUX_API_KEY: ${{ secrets.FLUX_API_KEY }}
          FLUX_MODEL: ${{ secrets.FLUX_MODEL }}
          AUDIO_ENDPOINT: ${{ secrets.AUDIO_ENDPOINT }}
          AUDIO_API_KEY: ${{ secrets.AUDIO_API_KEY }}
          AUDIO_MODEL: ${{ secrets.AUDIO_MODEL }}
        run: |
          bash tools/ci/generate_assets.sh --ai
          PKGDIR=duke3d-${{ github.ref_name }}-windows-x86
          mkdir -p $PKGDIR
          cp duke3d.exe DUKE3D.GRP README.md duke3d_launcher.bat $PKGDIR/
          bash tools/bundle_windows.sh $PKGDIR
          ls -la $PKGDIR/
           zip -r duke3d-${{ github.ref_name }}-windows-x86.zip $PKGDIR/
      
      - name: Validate generated artifacts
        if: matrix.target == 'windows'
        run: python3 tools/validate_generated_artifacts.py --sets textures grp maps scripts
      
      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: duke3d-${{ matrix.name }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 90

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
      
      - name: Validate release packages
        run: |
          for f in artifacts/**/*.tar.gz; do
            echo "Validating $f..."
            tar tzf "$f" | head -5
            echo "  Files: $(tar tzf "$f" | wc -l)"
          done
          for f in artifacts/**/*.zip; do
            echo "Validating $f..."
            unzip -l "$f" | tail -5
          done
      
      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -o -name '*.zip' | sort | while read f; do
            sha256sum "$f" >> ../SHA256SUMS.txt
          done
          cd ..
          cat SHA256SUMS.txt
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS.txt
          body: |
            ## Duke3D: Neon Noir ${{ github.ref_name }}
            
            ### Downloads
            - **Linux x64**: `duke3d-${{ github.ref_name }}-linux-x64.tar.gz`
            - **Windows x86**: `duke3d-${{ github.ref_name }}-windows-x86.zip`
            
            ### Quick Start
            Extract and run `duke3d` (Linux) or `duke3d.exe` (Windows).
            DUKE3D.GRP (game assets) is included.
            
            ### What's New
            See commit history for changes since last release.
          draft: false
          prerelease: false
