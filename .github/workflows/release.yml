name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: linux
          - name: windows-x86
            os: ubuntu-latest
            target: windows

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsdl2-dev gcc-mingw-w64-i686 python3 python3-pip
          pip3 install --break-system-packages -r requirements.txt
      
      - name: Install SDL2 MinGW (Windows only)
        if: matrix.target == 'windows'
        run: |
          bash tools/get_sdl2_mingw.sh
          SDL2_VERSION=$(grep '^SDL2_VERSION' build.mk | head -1 | sed 's/.*= *//')
          echo "SDL2_WIN_CFLAGS=-I$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/include/SDL2" >> $GITHUB_ENV
          echo "SDL2_WIN_LIBS=-L$(pwd)/SDL2-${SDL2_VERSION}/i686-w64-mingw32/lib -lmingw32 -lSDL2main -lSDL2" >> $GITHUB_ENV
      
      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "windows" ]; then
            make windows
          else
            make
          fi
      
      - name: Generate assets
        if: matrix.target == 'linux'
        env:
          FLUX_ENDPOINT: ${{ secrets.FLUX_ENDPOINT }}
          FLUX_API_KEY: ${{ secrets.FLUX_API_KEY }}
          FLUX_MODEL: ${{ secrets.FLUX_MODEL }}
          AUDIO_ENDPOINT: ${{ secrets.AUDIO_ENDPOINT }}
          AUDIO_API_KEY: ${{ secrets.AUDIO_API_KEY }}
          AUDIO_MODEL: ${{ secrets.AUDIO_MODEL }}
        run: |
          if [ -n "$AUDIO_ENDPOINT" ] && [ -n "$AUDIO_API_KEY" ]; then
            echo "🔊 Generating AI audio (GPT Audio 1.5)..."
            python3 tools/generate_audio.py
          else
            echo "🔇 No audio API keys — generating silence stubs"
            python3 tools/generate_audio.py --no-ai
          fi
          if [ -n "$FLUX_ENDPOINT" ] && [ -n "$FLUX_API_KEY" ]; then
            echo "🎨 Generating AI textures (FLUX.2-pro)..."
            python3 tools/generate_assets.py
          else
            echo "🖌️ No FLUX API keys — generating procedural assets"
            python3 tools/generate_assets.py --no-ai
          fi
          echo "📦 GRP size: $(stat -c%s DUKE3D.GRP) bytes"
      
      - name: Package Linux release
        if: matrix.target == 'linux'
        run: |
          mkdir -p duke3d-${{ github.ref_name }}-linux-x64
          cp duke3d DUKE3D.GRP README.md duke3d-${{ github.ref_name }}-linux-x64/
          tar czf duke3d-${{ github.ref_name }}-linux-x64.tar.gz duke3d-${{ github.ref_name }}-linux-x64/
      
      - name: Package Windows release
        if: matrix.target == 'windows'
        env:
          FLUX_ENDPOINT: ${{ secrets.FLUX_ENDPOINT }}
          FLUX_API_KEY: ${{ secrets.FLUX_API_KEY }}
          FLUX_MODEL: ${{ secrets.FLUX_MODEL }}
          AUDIO_ENDPOINT: ${{ secrets.AUDIO_ENDPOINT }}
          AUDIO_API_KEY: ${{ secrets.AUDIO_API_KEY }}
          AUDIO_MODEL: ${{ secrets.AUDIO_MODEL }}
        run: |
          if [ -n "$AUDIO_ENDPOINT" ] && [ -n "$AUDIO_API_KEY" ]; then
            python3 tools/generate_audio.py
          else
            python3 tools/generate_audio.py --no-ai
          fi
          if [ -n "$FLUX_ENDPOINT" ] && [ -n "$FLUX_API_KEY" ]; then
            python3 tools/generate_assets.py
          else
            python3 tools/generate_assets.py --no-ai
          fi
          PKGDIR=duke3d-${{ github.ref_name }}-windows-x86
          mkdir -p $PKGDIR
          cp duke3d.exe DUKE3D.GRP README.md duke3d_launcher.bat $PKGDIR/
          bash tools/bundle_windows.sh $PKGDIR
          ls -la $PKGDIR/
          zip -r duke3d-${{ github.ref_name }}-windows-x86.zip $PKGDIR/
      
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-${{ matrix.name }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 90

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Validate release packages
        run: |
          for f in artifacts/**/*.tar.gz; do
            echo "Validating $f..."
            tar tzf "$f" | head -5
            echo "  Files: $(tar tzf "$f" | wc -l)"
          done
          for f in artifacts/**/*.zip; do
            echo "Validating $f..."
            unzip -l "$f" | tail -5
          done
      
      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -o -name '*.zip' | sort | while read f; do
            sha256sum "$f" >> ../SHA256SUMS.txt
          done
          cd ..
          cat SHA256SUMS.txt
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS.txt
          body: |
            ## Duke3D: Neon Noir ${{ github.ref_name }}
            
            ### Downloads
            - **Linux x64**: `duke3d-${{ github.ref_name }}-linux-x64.tar.gz`
            - **Windows x86**: `duke3d-${{ github.ref_name }}-windows-x86.zip`
            
            ### Quick Start
            Extract and run `duke3d` (Linux) or `duke3d.exe` (Windows).
            DUKE3D.GRP (game assets) is included.
            
            ### What's New
            See commit history for changes since last release.
          draft: false
          prerelease: false
