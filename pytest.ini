[pytest]
# perf-r12-pytest-xdist-integration: parallel test execution via -n auto
# perf-r12-xdist-fixture-redesign: filelock-based singleton init (session-autouse fixture)
# The session-autouse `generated_audio_artifacts` fixture uses FileLock to coordinate
# across xdist workers, ensuring artifacts are generated once and shared safely.
addopts = -n auto --dist loadscope
markers =
    playtest: Visual playtesting — launches game headless and validates captured frames
    slow: tests that run subprocesses or compile C; opt-in via --runslow (default: skipped)
    serial: mark test to run serially (incompatible with parallel xdist execution)


